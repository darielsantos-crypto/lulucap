<style>

*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(900px 620px at 20% 0%,rgba(255,211,77,.20),transparent 55%),radial-gradient(850px 720px at 90% 18%,rgba(231,25,52,.25),transparent 58%),linear-gradient(180deg,#031020,#061a3a 58%,#030914);overflow-x:hidden}body:before{content:"";position:fixed;inset:-80px;pointer-events:none;background:repeating-conic-gradient(from 0deg at 50% 22%,rgba(255,255,255,.04) 0 10deg,transparent 10deg 22deg);opacity:.35}.app{min-height:100%;max-width:1180px;margin:0 auto;padding:calc(14px + var(--safe-top)) 14px calc(22px + var(--safe-bottom));position:relative;z-index:1}header{display:flex;align-items:center;justify-content:center;padding:4px 0 10px}.logo{width:min(360px,86vw);display:block;filter:drop-shadow(0 18px 40px rgba(0,0,0,.55))}.layout{display:grid;grid-template-columns:380px 1fr;gap:14px;align-items:start}.panel{background:var(--card);border:1px solid var(--stroke);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(10px)}.panelHead{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px 14px;background:linear-gradient(90deg,rgba(0,46,106,.55),rgba(231,25,52,.22));border-bottom:1px solid rgba(255,255,255,.10)}.panelHead strong{font-size:14px}.panelHead small{font-size:12px;color:var(--muted);font-weight:700}.panelBody{padding:14px;display:grid;gap:10px}input,textarea,button{font:inherit}input,textarea{width:100%;color:var(--text);background:rgba(3,12,28,.68);border:1px solid rgba(255,255,255,.14);outline:none;border-radius:16px;padding:13px;box-shadow:0 10px 30px rgba(0,0,0,.16) inset}textarea{min-height:108px;resize:vertical;line-height:1.35}input::placeholder,textarea::placeholder{color:rgba(244,248,255,.55)}.btn{border:0;border-radius:16px;padding:13px 14px;font-weight:950;color:var(--text);cursor:pointer;user-select:none;touch-action:mani gba(231,25,52,.25),transparent 60%),linear-gradient(180deg,rgba(7,25,57,.96),rgba(3,12,28,.98));box-shadow:0 30px 120px rgba(0,0,0,.72);position:relative;animation:pop .25s ease-out}@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}#confetti{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.modalBody{position:relative;padding:26px 18px 18px;text-align:center;display:grid;gap:12px}.modalLogo{width:min(230px,68vw);margin:0 auto;filter:drop-shadow(0 14px 30px rgba(0,0,0,.5))}.winnerName{font-size:clamp(30px,8vw,54px);font-weight:1000;line-height:1.04;text-shadow:0 14px 34px rgba(0,0,0,.55)}.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 18px 18px}.modalActions .btn{white-space:normal}.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);background:rgba(3,12,28,.92);border:1px solid rgba(255,255,255,.14);color:#fff;padding:11px 14px;border-radius:999px;font-size:13px;font-weight:850;z-index:120;display:none;box-shadow:0 14px 40px rgba(0,0,0,.4)}.toast.show{display:block}@media(max-width:980px){.app{padding-left:10px;padding-right:10px}.layout{grid-template-columns:1fr}.wheelPanel{grid-template-columns:1fr}.side{order:2}canvas#wheel{width:min(540px,94vw);height:min(540px,94vw)}}@media(max-width:520px){.logo{width:min(300px,86vw)}.row{display:grid;grid-template-columns:1fr}.winnersList{grid-template-columns:1fr}.modalActions{grid-template-columns:1fr}.chips{max-height:220px}.panelBody{padding:12px}.wheelPanel{padding:10px}.stage{padding:6px}}

<body>
<div class="app"><header><img class="logo" src="assets/logo-lulucap.png" alt="Lulucap"></header><main class="layout"><section class="panel"><div class="panelHead"><strong>Participantes</strong><small><span id="availableCount">0</span> disponíveis</small></div><div class="panelBody"><input id="nameInput" type="text" placeholder="Nome do participante"><button class="btn green full" id="addNameBtn">Adicionar nome</button><textarea id="bulkInput" placeholder="Adicionar em lote, separado por vírgula ou um nome por linha"></textarea><button class="btn ghost full" id="bulkBtn">Adicionar em lote</button><div class="sectionTitle"><span>Próximo sorteio</span><span class="counter"><span id="poolCount">0</span> na roleta</span></div><div class="chips" id="peopleList"></div><div class="row"><button class="btn ghost" id="selectAllBtn">Adicionar todos</button><button class="btn red" id="clearPoolBtn">Limpar roleta</button></div></div></section><section class="panel"><div class="wheelPanel"><div class="stage"><div class="pointer"></div><canvas id="wheel" width="900" height="900"></canvas></div><div class="side"><button class="btn gold spinBtn" id="spinBtn">GIRAR ROLETA</button><div class="stat"><span>Na roleta</span><b id="statPool">0</b></div><div class="stat"><span>Último contemplado</span><b id="lastWinner">Nenhum</b></div><button class="btn ghost" id="shuffleBtn">Embaralhar</button><div class="sectionTitle"><span>Contemplados</span><span class="counter" id="winnerCount">0</span></div><div class="winnersList" id="winnersList"></div></div></div></section></main></div><div class="overlay" id="overlay"><div class="modal"><canvas id="confetti"></canvas><div class="modalBody"><img class="modalLogo" src="assets/logo-lulucap.png" alt="Lulucap"><div style="font-weight:950;color:var(--gold)">Contemplado</div><div class="winnerName" id="winnerName">Nome</div></div><div class="modalActions"><button class="btn green" id="registerWinnerBtn">Registrar contemplado</button><button class="btn ghost" id="closeModalBtn">Fechar</button></div></div></div><div class="toast" id="toast"></div>
<script>
const SUPABASE_URL="";const SUPABASE_ANON_KEY="";
const initialWinners=["Theresa","Rubens 1","Bruna","Frank","Manoel","Lucimara"];const initialPeople=["Dariel","Brêndon","Rubens 2","Fernando","Sthefany","Ranno","Ellys","Luciane"];
let people=[],winners=[],pool=[],pendingWinner=null,angle=0,spinning=false,spinStart=0,spinDuration=0,startAngle=0,targetAngle=0;const $=s=>document.querySelector(s),canvas=$("#wheel"),ctx=canvas.getContext("2d"),nameInput=$("#nameInput"),bulkInput=$("#bulkInput"),peopleList=$("#peopleList"),winnersList=$("#winnersList"),spinBtn=$("#spinBtn"),overlay=$("#overlay"),winnerName=$("#winnerName"),toast=$("#toast"),regBtn=$("#registerWinnerBtn");const normalize=s=>(s||"").trim().replace(/\s+/g," "),cleanName=s=>normalize(s.replace(/[🏆💰🍀🎉🎰✨⭐💵🎁🧿✅❌]/g,""));function unique(a){let o=[],seen=new Set();a.forEach(n=>{let k=n.toLowerCase();if(n&&!seen.has(k)){seen.add(k);o.push(n)}});return o}function showToast(m){toast.textContent=m;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),2200)}function parseNames(t){return unique((t||"").split(/[\n,;]+/g).map(cleanName).filter(Boolean))}function load(){try{let s=JSON.parse(localStorage.getItem("lulucap-state")||"{}");people=Array.isArray(s.people)?s.people:[...initialPeople];winners=Array.isArray(s.winners)?s.winners:[...initialWinners];pool=Array.isArray(s.pool)?s.pool:[]}catch(e){people=[...initialPeople];winners=[...initialWinners];pool=[]}people=unique(people.map(cleanName).filter(Boolean)).filter(n=>!winners.includes(n));winners=unique(winners.map(cleanName).filter(Boolean));pool=unique(pool.map(cleanName).filter(Boolean)).filter(n=>people.includes(n)&&!winners.includes(n))}function save(){localStorage.setItem("lulucap-state",JSON.stringify({people,winners,pool}))}function addPerson(v){let n=cleanName(v);if(!n)return;if(winners.some(x=>x.toLowerCase()===n.toLowerCase()))return showToast("Esse nome já foi contemplado.");if(!people.some(x=>x.toLowerCase()===n.toLowerCase()))people.push(n);if(!pool.some(x=>x.toLowerCase()===n.toLowerCase()))pool.push(n);save();render()}function removePerson(n){people=people.filter(x=>x!==n);pool=pool.filter(x=>x!==n);save();render()}function togglePool(n){pool=pool.includes(n)?pool.filter(x=>x!==n):[...pool,n];save();render()}function editPerson(old){let n=cleanName(prompt("Trocar nome:",old));if(!n)return;if(winners.includes(n))return showToast("Esse nome já foi contemplado.");people=people.map(x=>x===old?n:x);pool=pool.map(x=>x===old?n:x);save();render()}function renderPeople(){peopleList.innerHTML="";if(!people.length){peopleList.innerHTML='<div class="person"><div class="personName">Nenhum participante disponível</div></div>';return}people.forEach(n=>{let inP=pool.includes(n),d=document.createElement("div");d.className="person"+(inP?" inWheel":"");d.innerHTML=`<div class="personName" title="${n}">${n}</div><button class="mini ${inP?'remove':'add'}">${inP?'Remover':'Add'}</button><button class="mini edit">Trocar</button>`;d.children[1].onclick=()=>togglePool(n);d.children[2].onclick=()=>editPerson(n);peopleList.appendChild(d)})}function renderWinners(){winnersList.innerHTML="";if(!winners.length){winnersList.innerHTML='<div class="winnerPill">Nenhum ainda</div>';return}winners.slice().reverse().forEach(n=>{let d=document.createElement("div");d.className="winnerPill";d.textContent=n;d.title=n;winnersList.appendChild(d)})}function render(){renderPeople();renderWinners();$("#availableCount").textContent=people.length;$("#poolCount").textContent=pool.length;$("#statPool").textContent=pool.length;$("#winnerCount").textContent=winners.length;$("#lastWinner").textContent=winners.length?winners[winners.length-1]:"Nenhum";spinBtn.disabled=pool.length<2||spinning;drawWheel()}
let audioCtx=null,music={on:false,nodes:[],timer:null,step:0};function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}function beep(f,d,t="sine",g=.04){try{ensureAudio();let o=audioCtx.createOscillator(),ga=audioCtx.createGain();o.type=t;o.frequency.value=f;ga.gain.value=g;o.connect(ga);ga.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d/1000)}catch(e){}}function startMusic(){try{ensureAudio();if(audioCtx.state==="suspended")audioCtx.resume();if(music.on)return;music.on=true;music.step=0;let m=audioCtx.createGain();m.gain.value=.13;m.connect(audioCtx.destination);let b=audioCtx.createOscillator(),bg=audioCtx.createGain(),l=audioCtx.createOscillator(),lg=audioCtx.createGain(),c=audioCtx.createOscillator(),cg=audioCtx.createGain();b.type="triangle";bg.gain.value=.17;b.connect(bg);bg.connect(m);l.type="square";lg.gain.value=.065;l.connect(lg);lg.connect(m);c.type="sine";cg.gain.value=0;c.connect(cg);cg.connect(m);b.start();l.start();c.start();music.nodes=[m,b,bg,l,lg,c,cg];let sc=[0,2,4,7,9,7,4,2],ch=[0,5,7,5];music.timer=setInterval(()=>{let t=audioCtx.currentTime;b.frequency.setValueAtTime(110+ch[music.step%ch.length]*4,t);l.frequency.setValueAtTime(220*Math.pow(2,sc[music.step%sc.length]/12),t);c.frequency.setValueAtTime(900+(music.step%2)*180,t);cg.gain.cancelScheduledValues(t);cg.gain.setValueAtTime(0,t);cg.gain.linearRampToValueAtTime(.09,t+.01);cg.gain.linearRampToValueAtTime(0,t+.06);music.step++},145)}catch(e){}}function stopMusic(){try{if(music.timer)clearInterval(music.timer);music.timer=null;music.on=false;music.nodes.forEach(n=>{try{if(typeof n.stop==="function")n.stop();if(typeof n.disconnect==="function")n.disconnect()}catch(e){}});music.nodes=[]}catch(e){}}
function resizeCanvas(){let css=canvas.clientWidth,dpr=window.devicePixelRatio||1;canvas.width=Math.round(css*dpr);canvas.height=Math.round(css*dpr);return dpr}function drawWheel(){let dpr=resizeCanvas(),w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,r=Math.min(w,h)*.45;ctx.clearRect(0,0,w,h);ctx.save();ctx.translate(cx,cy);ctx.beginPath();ctx.arc(0,0,r*1.08,0,Math.PI*2);ctx.strokeStyle="rgba(255,211,77,.24)";ctx.lineWidth=r*.08;ctx.shadowColor="rgba(255,211,77,.28)";ctx.shadowBlur=r*.16;ctx.stroke();ctx.restore();let n=pool.length;if(!n){ctx.save();ctx.translate(cx,cy);ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,.08)";ctx.fill();ctx.fillStyle="rgba(244,248,255,.90)";ctx.font=`900 ${Math.round(r*.12)}px system-ui`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("Adicione nomes",0,-8);ctx.fillStyle="rgba(185,202,239,.95)";ctx.font=`800 ${Math.round(r*.065)}px system-ui`;ctx.fillText("para girar a roleta",0,30);ctx.restore();return}let slice=Math.PI*2/n;for(let i=0;i<n;i++){let a0=angle+i*slice,a1=a0+slice,isB=i%2===0,base=isB?[0,46,106]:[231,25,52];ctx.save();ctx.translate(cx,cy);ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,a0,a1);ctx.closePath();let gr=ctx.createRadialGradient(0,0,r*.1,0,0,r);gr.addColorStop(0,`rgba(${base[0]},${base[1]},${base[2]},.96)`);gr.addColorStop(1,`rgba(${base[0]},${base[1]},${base[2]},.74)`);ctx.fillStyle=gr;ctx.fill();ctx.strokeStyle="rgba(255,255,255,.16)";ctx.lineWidth=Math.max(1,r*.007);ctx.stroke();ctx.rotate((a0+a1)/2);ctx.textAlign="right";ctx.textBaseline="middle";let fs=Math.max(12*dpr,Math.min(42*dpr,r*(n<=8?.09:n<=14?.072:.055)));ctx.font=`900 ${Math.round(fs)}px system-ui`;ctx.fillStyle="rgba(255,255,255,.96)";ctx.shadowColor="rgba(0,0,0,.35)";ctx.shadowBlur=r*.025;let lab=pool[i].length>16?pool[i].slice(0,15)+"…":pool[i];ctx.fillText(lab,r*.92,0);ctx.restore()}ctx.save();ctx.translate(cx,cy);ctx.beginPath();ctx.arc(0,0,r*.22,0,Math.PI*2);ctx.fillStyle="rgba(5,14,30,.74)";ctx.fill();ctx.strokeStyle="rgba(255,211,77,.45)";ctx.lineWidth=r*.018;ctx.stroke();ctx.fillStyle="rgba(255,211,77,.98)";ctx.font=`950 ${Math.round(r*.078)}px system-ui`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("Lulucap",0,-2);ctx.restore()}function getWinnerIndex(){let n=pool.length;if(!n)return-1;let slice=Math.PI*2/n,a=(-Math.PI/2-angle)%(Math.PI*2);if(a<0)a+=Math.PI*2;return Math.floor(a/slice)%n}function ease(t){return 1-Math.pow(1-t,3)}function spin(){if(spinning||pool.length<2)return;try{ensureAudio();if(audioCtx.state==="suspended")audioCtx.resume()}catch(e){}spinning=true;spinBtn.disabled=true;let extra=10+Math.random()*7;startAngle=angle;targetAngle=angle+extra*Math.PI*2+Math.random()*Math.PI*2;spinStart=performance.now();spinDuration=7000+Math.random()*2600;beep(220,140,"sawtooth",.035);startMusic();requestAnimationFrame(tick)}let lastTick=0;function tick(now){let t=Math.min((now-spinStart)/spinDuration,1);angle=startAngle+(targetAngle-startAngle)*ease(t);if(now-lastTick>(t<.65?210:t<.85?140:90)){lastTick=now;beep(520+Math.random()*160,30,"square",.015)}drawWheel();if(t<1){requestAnimationFrame(tick);return}spinning=false;lastTick=0;stopMusic();let idx=getWinnerIndex(),name=idx>=0?pool[idx]:null;if(!name)return;pendingWinner=name;winnerName.textContent=name;overlay.classList.add("show");startConfetti();beep(880,140,"sine",.045);setTimeout(()=>beep(1320,190,"sine",.045),110);render()}
const confettiCanvas=$("#confetti"),cctx=confettiCanvas.getContext("2d");let confetti=[],confettiRAF=0;function resizeConfetti(){let dpr=window.devicePixelRatio||1,rect=confettiCanvas.getBoundingClientRect();confettiCanvas.width=Math.round(rect.width*dpr);confettiCanvas.height=Math.round(rect.height*dpr);cctx.setTransform(dpr,0,0,dpr,0,0)}function makeConfetti(){confetti=[];let rect=confettiCanvas.getBoundingClientRect(),W=rect.width,H=rect.height,count=Math.max(90,Math.min(170,Math.round(W/6))),colors=["#ffd34d","#e71934","#fff","#18d172","#1593ff"];for(let i=0;i<count;i++)confetti.push({x:Math.random()*W,y:-20-Math.random()*H*.4,w:6+Math.random()*10,h:6+Math.random()*14,vy:2+Math.random()*4.5,vx:-1.3+Math.random()*2.6,rot:Math.random()*Math.PI*2,vr:-.12+Math.random()*.24,color:colors[i%colors.length]})}function drawConfetti(){let r=confettiCanvas.getBoundingClientRect(),W=r.width,H=r.height;cctx.clearRect(0,0,W,H);confetti.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;if(p.y>H+40){p.y=-30-Math.random()*60;p.x=Math.random()*W}cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.rot);cctx.fillStyle=p.color;cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cctx.restore()});confettiRAF=requestAnimationFrame(drawConfetti)}function startConfetti(){cancelAnimationFrame(confettiRAF);resizeConfetti();makeConfetti();drawConfetti()}function stopConfetti(){cancelAnimationFrame(confettiRAF);confettiRAF=0}
async function saveWinnerToSupabase(name){if(!SUPABASE_URL||!SUPABASE_ANON_KEY)return{skipped:true};let res=await fetch(`${SUPABASE_URL}/rest/v1/lulucap_winners`,{method:"POST",headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({name})});if(!res.ok)throw new Error(await res.text().catch(()=>"Erro"));return{ok:true}}async function registerWinner(){if(!pendingWinner)return;let name=pendingWinner;regBtn.disabled=true;regBtn.textContent="Registrando...";try{await saveWinnerToSupabase(name)}catch(e){showToast("Não salvou no Supabase, ficou salvo no aparelho.")}if(!winners.includes(name))winners.push(name);people=people.filter(n=>n!==name);pool=pool.filter(n=>n!==name);pendingWinner=null;save();closeModal();render();showToast("Contemplado registrado.")}function closeModal(){overlay.classList.remove("show");stopConfetti();regBtn.disabled=false;regBtn.textContent="Registrar contemplado"}
$("#addNameBtn").onclick=()=>{addPerson(nameInput.value);nameInput.value="";nameInput.focus()};nameInput.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();$("#addNameBtn").click()}});$("#bulkBtn").onclick=()=>{parseNames(bulkInput.value).forEach(addPerson);bulkInput.value="";save();render()};$("#selectAllBtn").onclick=()=>{pool=unique([...pool,...people.filter(n=>!winners.includes(n))]);save();render()};$("#clearPoolBtn").onclick=()=>{pool=[];save();render()};$("#shuffleBtn").onclick=()=>{for(let i=pool.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}save();render()};spinBtn.onclick=spin;canvas.onclick=spin;regBtn.onclick=registerWinner;$("#closeModalBtn").onclick=closeModal;overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal()});window.addEventListener("resize",drawWheel);load();render();
