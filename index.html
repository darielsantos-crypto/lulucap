<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#061a3a">
<link rel="manifest" href="manifest.webmanifest">
<title>Lulucap</title>
<style>
:root{--b:#061a3a;--b2:#031020;--r:#e71934;--g:#18d172;--y:#ffd34d;--t:#f4f8ff;--m:#b9caef;--c:rgba(7,25,57,.78);--s:rgba(255,255,255,.12);--rad:22px}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--t);background:radial-gradient(900px 620px at 20% 0%,rgba(255,211,77,.20),transparent 55%),radial-gradient(850px 720px at 90% 18%,rgba(231,25,52,.25),transparent 58%),linear-gradient(180deg,#031020,#061a3a 58%,#030914);min-height:100vh;overflow-x:hidden}
.app{max-width:1180px;margin:auto;padding:14px 12px 28px}header{display:flex;justify-content:center}.logo{width:min(340px,88vw);filter:drop-shadow(0 18px 40px #0008)}
.layout{display:grid;grid-template-columns:380px 1fr;gap:14px}.panel{background:var(--c);border:1px solid var(--s);border-radius:var(--rad);box-shadow:0 18px 60px #0007;overflow:hidden;backdrop-filter:blur(10px)}.head{display:flex;justify-content:space-between;padding:13px 14px;background:linear-gradient(90deg,rgba(0,46,106,.55),rgba(231,25,52,.22));border-bottom:1px solid #fff2}.head strong{font-size:14px}.head small{color:var(--m);font-weight:800}.body{padding:14px;display:grid;gap:10px}
input,textarea,button{font:inherit}input,textarea{width:100%;border:1px solid #fff2;border-radius:16px;background:#030c1cad;color:var(--t);padding:13px;outline:0}textarea{min-height:92px;resize:vertical}.btn{border:0;border-radius:16px;padding:13px 14px;font-weight:950;color:var(--t);background:linear-gradient(135deg,#0b3d8d,#062a68);cursor:pointer;touch-action:manipulation}.btn.green{background:linear-gradient(135deg,#24dd83,#11b961);color:#03150a}.btn.red{background:linear-gradient(135deg,var(--r),#ff3955)}.btn.ghost{background:#030c1c85;border:1px solid #fff2}.btn.gold{background:linear-gradient(135deg,#ffe383,#ffba18);color:#1e1400}.btn.spin{font-size:18px;min-height:58px;animation:pulse 1.1s infinite}@keyframes pulse{50%{filter:brightness(1.18);transform:translateY(-1px)}}.row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tab{padding:11px;border-radius:14px;border:1px solid #fff2;background:#030c1c80;color:var(--m);font-weight:900}.tab.active{background:rgba(255,211,77,.16);color:#fff;border-color:rgba(255,211,77,.35)}
.list{display:grid;gap:8px;max-height:280px;overflow:auto}.person{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:10px;border:1px solid #fff2;border-radius:16px;background:#030c1c75}.person.in{border-color:rgba(255,211,77,.45);background:rgba(255,211,77,.08)}.name{font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mini{border:1px solid #fff2;background:#ffffff12;color:#fff;border-radius:12px;padding:8px 9px;font-weight:900}
.wheelGrid{display:grid;grid-template-columns:1fr 230px;gap:14px;padding:14px;align-items:center}.stage{position:relative;display:grid;place-items:center;border-radius:22px;background:#030c1c45;border:1px solid #fff1;overflow:hidden;padding:8px}canvas#wheel{width:min(560px,86vw);height:min(560px,86vw);border-radius:999px;filter:drop-shadow(0 26px 70px #0008)}.pointer{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:30px solid var(--y);filter:drop-shadow(0 10px 18px #0009);z-index:2}.side{display:grid;gap:10px}.stat{display:flex;justify-content:space-between;gap:10px;padding:11px 12px;background:#030c1c70;border:1px solid #fff2;border-radius:16px;color:var(--m);font-size:12px;font-weight:850}.stat b{color:#fff}.winners{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.pill{padding:10px;border-radius:14px;border:1px solid rgba(255,211,77,.28);background:rgba(255,211,77,.10);font-weight:950;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.overlay{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;padding:18px;z-index:20}.overlay.show{display:flex}.modal{width:min(520px,92vw);border-radius:26px;background:linear-gradient(180deg,rgba(7,25,57,.98),rgba(3,12,28,.98));border:1px solid #fff3;box-shadow:0 30px 120px #000b;position:relative;overflow:hidden}.modalBody{text-align:center;padding:26px 18px 18px;display:grid;gap:12px}.modalLogo{width:min(230px,68vw);margin:auto}.winnerName{font-size:clamp(30px,8vw,54px);font-weight:1000}.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 18px 18px}#confetti{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#030c1cee;border:1px solid #fff2;padding:11px 14px;border-radius:999px;display:none;font-weight:850}.toast.show{display:block}
@media(max-width:980px){.layout,.wheelGrid{grid-template-columns:1fr}.side{order:2}canvas#wheel{width:min(540px,94vw);height:min(540px,94vw)}}@media(max-width:520px){.row,.modalActions{display:grid;grid-template-columns:1fr}.winners{grid-template-columns:1fr}.logo{width:min(300px,88vw)}}
</style>
</head>
<body>
<div class="app">
<header><img class="logo" src="assets/logo-lulucap.png" alt="Lulucap"></header>
<main class="layout">
<section class="panel">
<div class="head"><strong>Base do Consórcio</strong><small id="syncStatus">Supabase</small></div>
<div class="body">
<input id="nameInput" placeholder="Nome do participante">
<div class="row"><button class="btn green" id="addBtn">Adicionar</button><button class="btn ghost" id="refreshBtn">Atualizar</button></div>
<textarea id="bulkInput" placeholder="Adicionar em lote: separados por vírgula ou um por linha"></textarea>
<button class="btn ghost" id="bulkBtn">Adicionar em lote</button>
<div class="tabs"><button class="tab active" data-tab="pending">Faltam</button><button class="tab" data-tab="winner">Ganharam</button><button class="tab" data-tab="removed">Removidos</button></div>
<div class="list" id="peopleList"></div>
<div class="row"><button class="btn ghost" id="addAllBtn">Add todos à roleta</button><button class="btn red" id="clearPoolBtn">Limpar roleta</button></div>
</div>
</section>
<section class="panel">
<div class="wheelGrid">
<div class="stage"><div class="pointer"></div><canvas id="wheel"></canvas></div>
<div class="side">
<button class="btn gold spin" id="spinBtn">GIRAR ROLETA</button>
<div class="stat"><span>Na roleta</span><b id="poolN">0</b></div>
<div class="stat"><span>Último contemplado</span><b id="lastWinner">Nenhum</b></div>
<button class="btn ghost" id="shuffleBtn">Embaralhar</button>
<div class="stat"><span>Contemplados</span><b id="winnerN">0</b></div>
<div class="winners" id="winnersBox"></div>
</div>
</div>
</section>
</main>
</div>
<div class="overlay" id="overlay"><div class="modal"><canvas id="confetti"></canvas><div class="modalBody"><img class="modalLogo" src="assets/logo-lulucap.png"><div style="font-weight:950;color:var(--y)">Contemplado</div><div class="winnerName" id="winnerName">Nome</div></div><div class="modalActions"><button class="btn green" id="registerBtn">Registrar contemplado</button><button class="btn ghost" id="closeBtn">Fechar</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL="https://vxwlzfidbcdzdusenxns.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_lufszmzag1-zfj1rdn3ByA__mO7T9jQ";
const API=SUPABASE_URL+"/rest/v1";
const HEADERS={"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY,"Content-Type":"application/json"};

const initialWinners=["Theresa","Rubens 1","Bruna","Frank","Manoel","Lucimara"];
const initialPeople=["Dariel","Brêndon","Rubens 2","Fernando","Sthefany","Ranno","Ellys","Luciane"];

let people=[], pool=[], tab="pending", pendingWinner=null, angle=0, spinning=false, spinStart=0, spinDuration=0, startAngle=0, targetAngle=0;
const $=s=>document.querySelector(s), canvas=$("#wheel"), ctx=canvas.getContext("2d");
const clean=s=>(s||"").trim().replace(/\s+/g," ").replace(/[🏆💰🍀🎉🎰✨⭐💵🎁🧿✅❌]/g,"");
const unique=a=>{const o=[],m=new Set();a.forEach(n=>{n=clean(n);const k=n.toLowerCase();if(n&&!m.has(k)){m.add(k);o.push(n)}});return o};
const parse=t=>unique((t||"").split(/[\n,;]+/g));

function toast(t){$("#toast").textContent=t;$("#toast").classList.add("show");setTimeout(()=>$("#toast").classList.remove("show"),2200)}
async function sb(path,opt={}){const r=await fetch(API+path,{...opt,headers:{...HEADERS,...(opt.headers||{})}});if(!r.ok)throw new Error(await r.text());return r.status===204?null:r.json()}
async function load(){try{people=await sb("/lulucap_people?select=*&order=created_at.asc");$("#syncStatus").textContent="Online"}catch(e){$("#syncStatus").textContent="Offline";people=JSON.parse(localStorage.getItem("people")||"[]");if(!people.length){people=[...initialWinners.map(name=>({name,status:"winner"})),...initialPeople.map(name=>({name,status:"pending"}))]}}pool=pool.filter(n=>people.some(p=>p.name===n&&p.status==="pending"));render()}
function saveLocal(){localStorage.setItem("people",JSON.stringify(people))}
async function addPerson(name,status="pending"){name=clean(name);if(!name)return;if(people.some(p=>p.name.toLowerCase()===name.toLowerCase())){toast("Nome já existe.");return}try{const rows=await sb("/lulucap_people",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify({name,status,winner_at:status==="winner"?new Date().toISOString():null})});people.push(rows[0])}catch(e){people.push({id:crypto.randomUUID(),name,status,winner_at:status==="winner"?new Date().toISOString():null});saveLocal()}if(status==="pending")pool.push(name);render()}
async function updateStatus(p,status){try{await sb(`/lulucap_people?id=eq.${p.id}`,{method:"PATCH",body:JSON.stringify({status,winner_at:status==="winner"?new Date().toISOString():null,removed_at:status==="removed"?new Date().toISOString():null})})}catch(e){}p.status=status;if(status!=="pending")pool=pool.filter(n=>n!==p.name);saveLocal();render()}
async function rename(p){const name=clean(prompt("Trocar nome:",p.name));if(!name)return;try{await sb(`/lulucap_people?id=eq.${p.id}`,{method:"PATCH",body:JSON.stringify({name})})}catch(e){}pool=pool.map(n=>n===p.name?name:n);p.name=name;saveLocal();render()}
async function delPerson(p){if(!confirm("Remover definitivamente este nome?"))return;try{await sb(`/lulucap_people?id=eq.${p.id}`,{method:"DELETE"})}catch(e){}people=people.filter(x=>x!==p);pool=pool.filter(n=>n!==p.name);saveLocal();render()}
function renderList(){const box=$("#peopleList");box.innerHTML="";people.filter(p=>p.status===tab).forEach(p=>{const inPool=pool.includes(p.name);const d=document.createElement("div");d.className="person"+(inPool?" in":"");let actions="";if(tab==="pending")actions=`<button class="mini">${inPool?"Sair":"Add"}</button><button class="mini">Trocar</button>`;else actions=`<button class="mini">Voltar</button><button class="mini">Excluir</button>`;d.innerHTML=`<div class="name">${p.name}</div>${actions}`;if(tab==="pending"){d.children[1].onclick=()=>{pool=inPool?pool.filter(n=>n!==p.name):[...pool,p.name];render()};d.children[2].onclick=()=>rename(p)}else{d.children[1].onclick=()=>updateStatus(p,"pending");d.children[2].onclick=()=>delPerson(p)}box.appendChild(d)});if(!box.innerHTML)box.innerHTML='<div class="person"><div class="name">Nenhum nome nesta lista</div></div>'}
function renderWinners(){const w=people.filter(p=>p.status==="winner");$("#winnersBox").innerHTML=w.slice().reverse().map(p=>`<div class="pill">${p.name}</div>`).join("")||'<div class="pill">Nenhum ainda</div>';$("#winnerN").textContent=w.length;$("#lastWinner").textContent=w.length?w[w.length-1].name:"Nenhum"}
function render(){renderList();renderWinners();$("#poolN").textContent=pool.length;$("#spinBtn").disabled=pool.length<2||spinning;drawWheel()}

let audioCtx=null,music={on:false,nodes:[],timer:null,step:0};function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}function beep(f,d,t="sine",g=.04){try{ensureAudio();const o=audioCtx.createOscillator(),ga=audioCtx.createGain();o.type=t;o.frequency.value=f;ga.gain.value=g;o.connect(ga);ga.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d/1000)}catch(e){}}function startMusic(){try{ensureAudio();if(audioCtx.state==="suspended")audioCtx.resume();if(music.on)return;music.on=true;const master=audioCtx.createGain();master.gain.value=.12;master.connect(audioCtx.destination);const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="square";g.gain.value=.06;o.connect(g);g.connect(master);o.start();music.nodes=[master,o,g];const scale=[0,2,4,7,9,7,4,2];music.step=0;music.timer=setInterval(()=>{o.frequency.setValueAtTime(220*Math.pow(2,scale[music.step%scale.length]/12),audioCtx.currentTime);music.step++},145)}catch(e){}}function stopMusic(){if(music.timer)clearInterval(music.timer);music.timer=null;music.on=false;music.nodes.forEach(n=>{try{if(n.stop)n.stop();if(n.disconnect)n.disconnect()}catch(e){}});music.nodes=[]}

function resize(){const css=canvas.clientWidth,dpr=devicePixelRatio||1;canvas.width=css*dpr;canvas.height=css*dpr;return dpr}
function drawWheel(){const dpr=resize(),w=canvas.width,c=w/2,r=w*.45;ctx.clearRect(0,0,w,w);ctx.save();ctx.translate(c,c);ctx.beginPath();ctx.arc(0,0,r*1.08,0,Math.PI*2);ctx.strokeStyle="rgba(255,211,77,.25)";ctx.lineWidth=r*.08;ctx.stroke();ctx.restore();if(!pool.length){ctx.save();ctx.translate(c,c);ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle="#ffffff15";ctx.fill();ctx.fillStyle="#fff";ctx.font=`900 ${r*.12}px system-ui`;ctx.textAlign="center";ctx.fillText("Adicione nomes",0,0);ctx.restore();return}const sl=Math.PI*2/pool.length;pool.forEach((n,i)=>{const a0=angle+i*sl,a1=a0+sl,base=i%2?[231,25,52]:[0,46,106];ctx.save();ctx.translate(c,c);ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,a0,a1);ctx.closePath();ctx.fillStyle=`rgb(${base})`;ctx.fill();ctx.strokeStyle="#ffffff28";ctx.lineWidth=2*dpr;ctx.stroke();ctx.rotate((a0+a1)/2);ctx.textAlign="right";ctx.textBaseline="middle";ctx.fillStyle="#fff";ctx.font=`900 ${Math.max(14*dpr,Math.min(36*dpr,r*.075))}px system-ui`;ctx.fillText(n.length>16?n.slice(0,15)+"…":n,r*.92,0);ctx.restore()});ctx.save();ctx.translate(c,c);ctx.beginPath();ctx.arc(0,0,r*.22,0,Math.PI*2);ctx.fillStyle="#06101dcc";ctx.fill();ctx.strokeStyle="rgba(255,211,77,.45)";ctx.lineWidth=r*.02;ctx.stroke();ctx.fillStyle="#ffd34d";ctx.font=`950 ${r*.08}px system-ui`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("Lulucap",0,0);ctx.restore()}
function winnerIndex(){const sl=Math.PI*2/pool.length;let a=(-Math.PI/2-angle)%(Math.PI*2);if(a<0)a+=Math.PI*2;return Math.floor(a/sl)%pool.length}
function spin(){if(spinning||pool.length<2)return;ensureAudio();if(audioCtx.state==="suspended")audioCtx.resume();spinning=true;$("#spinBtn").disabled=true;startAngle=angle;targetAngle=angle+(10+Math.random()*7)*Math.PI*2+Math.random()*Math.PI*2;spinStart=performance.now();spinDuration=7000+Math.random()*2500;startMusic();requestAnimationFrame(tick)}
let lastTick=0;function tick(now){const t=Math.min((now-spinStart)/spinDuration,1),e=1-Math.pow(1-t,3);angle=startAngle+(targetAngle-startAngle)*e;if(now-lastTick>(t<.65?210:t<.85?140:90)){lastTick=now;beep(520+Math.random()*160,30,"square",.015)}drawWheel();if(t<1)return requestAnimationFrame(tick);spinning=false;stopMusic();pendingWinner=pool[winnerIndex()];$("#winnerName").textContent=pendingWinner;$("#overlay").classList.add("show");startConfetti();beep(880,150);render()}

const cf=$("#confetti"),cfx=cf.getContext("2d");let conf=[],raf=0;function startConfetti(){cancelAnimationFrame(raf);const r=cf.getBoundingClientRect(),d=devicePixelRatio||1;cf.width=r.width*d;cf.height=r.height*d;cfx.setTransform(d,0,0,d,0,0);conf=Array.from({length:120},(_,i)=>({x:Math.random()*r.width,y:-Math.random()*r.height,v:2+Math.random()*5,w:5+Math.random()*10,h:5+Math.random()*13,c:["#ffd34d","#e71934","#fff","#18d172"][i%4]}));drawCf()}function drawCf(){const r=cf.getBoundingClientRect();cfx.clearRect(0,0,r.width,r.height);conf.forEach(p=>{p.y+=p.v;if(p.y>r.height)p.y=-20;cfx.fillStyle=p.c;cfx.fillRect(p.x,p.y,p.w,p.h)});raf=requestAnimationFrame(drawCf)}function stopConfetti(){cancelAnimationFrame(raf)}
async function register(){if(!pendingWinner)return;const p=people.find(x=>x.name===pendingWinner);if(p){try{await sb("/lulucap_draws",{method:"POST",body:JSON.stringify({person_id:p.id,winner_name:p.name})})}catch(e){}await updateStatus(p,"winner")}pool=pool.filter(n=>n!==pendingWinner);pendingWinner=null;closeModal();toast("Contemplado registrado")}
function closeModal(){$("#overlay").classList.remove("show");stopConfetti()}

$("#addBtn").onclick=()=>{addPerson($("#nameInput").value);$("#nameInput").value=""};$("#nameInput").onkeydown=e=>{if(e.key==="Enter")$("#addBtn").click()};$("#bulkBtn").onclick=()=>parse($("#bulkInput").value).forEach(n=>addPerson(n));$("#refreshBtn").onclick=load;$("#addAllBtn").onclick=()=>{pool=unique([...pool,...people.filter(p=>p.status==="pending").map(p=>p.name)]);render()};$("#clearPoolBtn").onclick=()=>{pool=[];render()};$("#shuffleBtn").onclick=()=>{pool.sort(()=>Math.random()-.5);render()};$("#spinBtn").onclick=spin;canvas.onclick=spin;$("#registerBtn").onclick=register;$("#closeBtn").onclick=closeModal;window.onresize=drawWheel;document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");tab=b.dataset.tab;render()});
load();
</script>
</body>
</html>
